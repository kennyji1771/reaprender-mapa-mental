    <style>

        /* Botones de navegación - siempre visibles y centrados */
        .nav-buttons {

        @media (max-width: 768px) {
            .mapa-container { width: 95%; left: 2.5%; height: 85%; top: 7.5%; }

        /* En horizontal, los botones se mantienen visibles */
        @media (orientation: landscape) {
            .nav-buttons { bottom: 10px; padding: 8px; }

<body>
<div class="presentation">
    <div class="image-viewer" id="imageViewer">
        <img id="slideImg" src="" alt="Diapositiva">
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="mapa-container" id="mapaContainer">
        <div class="mapa-header" id="mapaHeader">
            <span>🌱 Mapa de Crecimiento Orgánico</span>
            <div class="btn-group">
                <button id="expandirTodoMapa">🔽 Expandir todo</button>
                <button id="colapsarTodoMapa">🔼 Colapsar todo</button>
                <button id="cerrarMapaBtn">✖ Cerrar</button>
            </div>
        </div>

    </div>
    <div class="nav-buttons">
        <button id="prevSlideBtn">◀ Anterior</button>
        <button id="nextSlideBtn">Siguiente ▶</button>
        <button id="downloadAllPPTBtn">📊 Exportar TODO a PPTX</button>
        <button id="downloadAllPDFBtn">📄 Exportar TODO a PDF</button>
    </div>
    <button class="open-map-btn" id="openMapBtn">📊 Ver mapa de crecimiento</button>
</div>

<div id="notePanel" class="note-panel">
    <div class="note-panel-header" id="notePanelHeader">
        <span>✏️ Editar nota (Markdown)</span>
        <button id="closeNotePanelBtn">&times;</button>
    </div>
    <textarea id="noteTextarea" placeholder="Escribe aquí tu nota..."></textarea>
    <div class="note-panel-footer">
        <button id="saveNotePanelBtn">💾 Guardar</button>
    </div>
    <div class="resize-handle-note" id="resizeHandleNote"></div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. MANEJO DE ZOOM Y ARRASTRE (compatible con botones)
    // --------------------------------------------------------------
    const img = document.getElementById('slideImg');
    const viewer = document.getElementById('imageViewer');
    
    let transform = { x: 0, y: 0, scale: 1 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    
    let initialPinchDistance = 0;
    let initialPinchScale = 1;
    let pinchCenter = { x: 0, y: 0 };
    
    function getTouchDistance(touches) {
        if (touches.length < 2) return 0;
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
    }
    
    function getTouchCenter(touches) {
        if (touches.length < 2) return { x: 0, y: 0 };
        return {
            x: (touches[0].clientX + touches[1].clientX) / 2,
            y: (touches[0].clientY + touches[1].clientY) / 2
        };
    }
    
    function applyTransform() {
        img.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
    }
    
    function resetTransform() {
        transform = { x: 0, y: 0, scale: 1 };
        applyTransform();
    }
    
    // Ratón
    viewer.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragStart.x = e.clientX - transform.x;
        dragStart.y = e.clientY - transform.y;
        viewer.style.cursor = 'grabbing';
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        transform.x = e.clientX - dragStart.x;
        transform.y = e.clientY - dragStart.y;
        applyTransform();
    });
    window.addEventListener('mouseup', () => {
        isDragging = false;
        viewer.style.cursor = 'grab';
    });
    
    // Táctil (solo si el objetivo no es un botón del mapa)
    function isMapElement(target) {
        return target.closest('.mapa-container') || target.closest('.note-panel') || target.closest('.nav-buttons') || target.closest('.open-map-btn');
    }
    
    viewer.addEventListener('touchstart', (e) => {
        if (isMapElement(e.target)) return;
        e.preventDefault();
        const touches = Array.from(e.touches);
        if (touches.length === 1) {
            isDragging = true;
            dragStart.x = touches[0].clientX - transform.x;
            dragStart.y = touches[0].clientY - transform.y;
        } else if (touches.length === 2) {
            isDragging = false;
            initialPinchDistance = getTouchDistance(touches);
            initialPinchScale = transform.scale;
            const center = getTouchCenter(touches);
            pinchCenter = {
                x: (center.x - transform.x) / transform.scale,
                y: (center.y - transform.y) / transform.scale
            };
        }
    });
    
    viewer.addEventListener('touchmove', (e) => {
        if (isMapElement(e.target)) return;
        e.preventDefault();
        const touches = Array.from(e.touches);
        if (touches.length === 1 && isDragging) {
            transform.x = touches[0].clientX - dragStart.x;
            transform.y = touches[0].clientY - dragStart.y;
            applyTransform();
        } else if (touches.length === 2 && initialPinchDistance > 0) {
            const newDistance = getTouchDistance(touches);
            let newScale = initialPinchScale * (newDistance / initialPinchDistance);
            newScale = Math.min(Math.max(newScale, 0.5), 5);
            if (newScale !== transform.scale) {
                const center = getTouchCenter(touches);
                const dx = center.x - (pinchCenter.x * transform.scale + transform.x);
                const dy = center.y - (pinchCenter.y * transform.scale + transform.y);
                transform.x += dx;
                transform.y += dy;
                transform.scale = newScale;
                applyTransform();
            }
        }
    });
    
    viewer.addEventListener('touchend', (e) => {
        if (isMapElement(e.target)) return;
        e.preventDefault();
        if (e.touches.length < 2) initialPinchDistance = 0;
        if (e.touches.length === 0) isDragging = false;
        if (e.touches.length === 1) {
            const touch = e.touches[0];
            isDragging = true;
            dragStart.x = touch.clientX - transform.x;
            dragStart.y = touch.clientY - transform.y;
        }
    });
    
    // --------------------------------------------------------------
    // 2. DIAPOSITIVAS
    // --------------------------------------------------------------
    let currentSlide = 1;
    const totalSlides = 29;
    const IMG_PATH = "img/";
    
    function updateSlideImage() {
        img.src = `${IMG_PATH}Diapositiva${currentSlide}.PNG`;
        resetTransform();
        if (window.currentRenderData) {
            renderizarMapa(window.currentRenderData.raices, window.currentRenderData.nodosMap, window.currentRenderData.hijosMap);
        }
    }
    
    function nextSlide() {
        currentSlide = currentSlide < totalSlides ? currentSlide + 1 : 1;
        updateSlideImage();
    }
    function prevSlide() {
        currentSlide = currentSlide > 1 ? currentSlide - 1 : totalSlides;
        updateSlideImage();
    }
    
    document.getElementById('nextSlideBtn').addEventListener('click', nextSlide);
    document.getElementById('prevSlideBtn').addEventListener('click', prevSlide);
    
    // --------------------------------------------------------------
    // 3. MAPA MENTAL (TEXTO ORIGINAL COMPLETO)
    // --------------------------------------------------------------
    const textoOriginal = `# ESTRUCTURA Y OPERACIÓN DE UN SISTEMA OPERATIVO MODERNO
## 1. DEFINICIÓN Y PROPÓSITO FUNDAMENTAL
### 1.1. EL SISTEMA OPERATIVO (SO) COMO SOFTWARE DE BASE
#### 1.1.1. Intermediario entre hardware y usuario
##### 1.1.1.1. Oculta la complejidad del hardware
##### 1.1.1.2. Provee una interfaz de uso (CLI o GUI)
##### 1.1.1.3. Actúa como un gestor de recursos del sistema
#### 1.1.2. Elementos centrales del sistema
##### 1.1.2.1. El **kernel**: el núcleo del sistema operativo
##### 1.1.2.2. Los **servicios del sistema** (demonios)
##### 1.1.2.3. Las **bibliotecas de sistema** (librerías compartidas)
##### 1.1.2.4. La **interfaz de usuario** (shell, entorno gráfico)
#### 1.1.3. Objetivos principales de un SO moderno
##### 1.1.3.1. **Eficiencia**: Uso óptimo de la CPU, memoria y E/S
##### 1.1.3.2. **Robustez**: Aislamiento de fallos y recuperación de errores
##### 1.1.3.3. **Seguridad**: Protección de datos y procesos
##### 1.1.3.4. **Concurrencia**: Manejo de múltiples tareas simultáneas
##### 1.1.3.5. **Portabilidad**: Capacidad de ejecutarse en diversas arquitecturas
## 2. ARQUITECTURAS DEL KERNEL
### 2.1. EVOLUCIÓN Y CLASIFICACIÓN
#### 2.1.1. Kernel Monolítico
##### 2.1.1.1. Todos los servicios del SO en un solo bloque de código
##### 2.1.1.2. Ventajas: Alto rendimiento y baja latencia
##### 2.1.1.3. Desventajas: Baja modularidad y difícil mantenimiento
##### 2.1.1.4. Ejemplo emblemático: **Linux** (versiones 6.x y 7.0)
#### 2.1.2. Microkernel
##### 2.1.2.1. Solo lo esencial en el núcleo (gestión de memoria básica, IPC)
##### 2.1.2.2. Servicios adicionales como servidores en espacio de usuario
##### 2.1.2.3. Ventajas: Alta modularidad, seguridad y estabilidad
##### 2.1.2.4. Desventajas: Menor rendimiento por comunicación entre módulos
##### 2.1.2.5. Uso en sistemas embebidos, automoción y entornos críticos
#### 2.1.3. Kernel Híbrido
##### 2.1.3.1. Combina la velocidad monolítica con la modularidad del microkernel
##### 2.1.3.2. Permite cargar y descargar módulos en tiempo de ejecución
##### 2.1.3.3. Ejemplos principales: Windows NT, macOS, Android, iOS
##### 2.1.3.4. Arquitectura predominante en la industria actual
#### 2.1.4. Otras arquitecturas emergentes
##### 2.1.4.1. **Exokernel**: Expone recursos directamente a las aplicaciones
##### 2.1.4.2. **Unikernel**: Combina SO y aplicación en una sola imagen
##### 2.1.4.3. **Multikernel**: Adaptado para sistemas con muchos núcleos
## 3. GESTIÓN DE PROCESOS
### 3.1. DEFINICIÓN Y CICLO DE VIDA DEL PROCESO
#### 3.1.1. El proceso como programa en ejecución
##### 3.1.1.1. **PCB (Process Control Block)** : Estructura de datos central del proceso
##### 3.1.1.2. Contiene: ID del proceso (PID), estado, contador de programa, registros, etc.
#### 3.1.2. Estados de un proceso
##### 3.1.2.1. **Nuevo** (New)
##### 3.1.2.2. **Listo** (Ready)
##### 3.1.2.3. **Ejecución** (Running)
##### 3.1.2.4. **Bloqueado** (Waiting)
##### 3.1.2.5. **Terminado** (Terminated)
#### 3.1.3. Tabla de procesos y colas de planificación
##### 3.1.3.1. Tabla de procesos (lista/vector de PCBs)
##### 3.1.3.2. Cola de procesos listos (ready queue)
##### 3.1.3.3. Colas de dispositivos (device queues)
### 3.2. PLANIFICACIÓN DE LA CPU (SCHEDULING)
#### 3.2.1. El planificador a corto plazo (dispatcher)
##### 3.2.1.1. Selecciona el siguiente proceso a ejecutar de la cola de listos
##### 3.2.1.2. Realiza el cambio de contexto (context switch)
#### 3.2.2. Algoritmos de planificación modernos
##### 3.2.2.1. **Round Robin (RR)** : Por turnos con quantum de tiempo
##### 3.2.2.2. **Prioridades**: Estáticas o dinámicas (con envejecimiento)
##### 3.2.2.3. **Multilevel Feedback Queue (MLFQ)**
##### 3.2.2.4. **Completely Fair Scheduler (CFS)** de Linux
##### 3.2.2.5. Planificación en tiempo real (EDF, RM)
#### 3.2.3. Hilos de ejecución (threads)
##### 3.2.3.1. **Hilos a nivel de usuario (ULT)**
##### 3.2.3.2. **Hilos a nivel de kernel (KLT)**
##### 3.2.3.3. Modelos de mapeo (many-to-one, one-to-one, many-to-many)
##### 3.2.3.4. Ventajas: Menor overhead de creación y cambio de contexto
## 4. GESTIÓN DE MEMORIA
### 4.1. PRINCIPIOS BÁSICOS
#### 4.1.1. Funciones clave del gestor de memoria
##### 4.1.1.1. **Asignar y liberar** espacios de memoria a los procesos
##### 4.1.1.2. **Proteger** la memoria de un proceso del acceso de otros
##### 4.1.1.3. **Mapear** direcciones lógicas a físicas
##### 4.1.1.4. Optimizar el uso de la RAM disponible
#### 4.1.2. Fragmentación de la memoria
##### 4.1.2.1. Fragmentación interna
##### 4.1.2.2. Fragmentación externa
##### 4.1.2.3. Técnicas de compactación y coalescencia
### 4.2. MEMORIA VIRTUAL
#### 4.2.1. Concepto y ventajas
##### 4.2.1.1. Aislamiento de espacios de direcciones entre procesos
##### 4.2.1.2. Permite ejecutar programas más grandes que la RAM física
##### 4.2.1.3. Simplifica la carga de programas en memoria
#### 4.2.2. Paginación
##### 4.2.2.1. División de la memoria física en **marcos de página**
##### 4.2.2.2. División de la memoria lógica en **páginas**
##### 4.2.2.3. Tabla de páginas (page table) por proceso
##### 4.2.2.4. TLB (Translation Lookaside Buffer) para acelerar traducciones
#### 4.2.3. Segmentación

    function parsear(texto) {
        const lineas = texto.split(/\r?\n/);
        const nodos = [];
        let pila = [];
        let id = 1;
        for (let linea of lineas) {
            linea = linea.trim();
            if (!linea) continue;
            let nivel = -1, etiqueta = linea;
            if (linea.startsWith("# ")) { nivel = 0; etiqueta = linea.slice(2).trim(); }
            else if (linea.startsWith("## ")) { nivel = 1; etiqueta = linea.slice(3).trim(); }
            else if (linea.startsWith("### ")) { nivel = 2; etiqueta = linea.slice(4).trim(); }
            else if (linea.startsWith("#### ")) { nivel = 3; etiqueta = linea.slice(5).trim(); }
            else if (linea.startsWith("##### ")) { nivel = 4; etiqueta = linea.slice(6).trim(); }
            else if (linea.startsWith("- ") || linea.startsWith("* ")) {
                nivel = pila.length ? pila[pila.length - 1].nivel + 1 : 1;
                etiqueta = linea.slice(2).trim();
            } else {
                nivel = pila.length ? pila[pila.length - 1].nivel + 1 : 1;
                etiqueta = linea;
            }
            while (pila.length && pila[pila.length - 1].nivel >= nivel) pila.pop();
            const padreId = pila.length ? pila[pila.length - 1].id : null;
            const nuevoId = id++;
            nodos.push({ id: nuevoId, etiqueta, nivel, padreId });
            pila.push({ id: nuevoId, nivel });
        }
        const hijosMap = new Map();
        nodos.forEach(n => hijosMap.set(n.id, []));
        nodos.forEach(n => { if (n.padreId) hijosMap.get(n.padreId).push(n.id); });
        const raices = nodos.filter(n => n.padreId === null);
        return { nodos, hijosMap, raices };
    }

    function renderizarMapa(raices, nodosMap, hijosMap) {
        const contenedor = document.getElementById('mapaContent');
        if (!raices.length) return;
        const build = (idNodo) => {
            const nodo = nodosMap.get(idNodo);
            if (!nodo) return null;
            const hijos = hijosMap.get(idNodo) || [];
            const card = document.createElement('div');
            card.className = `card level-${Math.min(nodo.nivel, 4)}`;
            card.dataset.nodeId = nodo.id;
            const tituloDiv = document.createElement('div');
            tituloDiv.className = 'title';
            const spanTitulo = document.createElement('span');
            spanTitulo.textContent = nodo.etiqueta;
            tituloDiv.appendChild(spanTitulo);
            if (nodo.nivel >= 1 && nodo.nivel <= 4) {
                const noteBtn = document.createElement('button');
                noteBtn.innerHTML = '✏️';
                noteBtn.className = 'note-btn';
                noteBtn.title = 'Añadir/editar nota';
                noteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openNotePanel(nodo.id, card);
                });
                tituloDiv.appendChild(noteBtn);
            }
            let childDiv = null, icono = null;
            if (hijos.length) {
                childDiv = document.createElement('div');
                childDiv.className = 'children collapsed';
                const hijosInvertidos = [...hijos].reverse();
                for (let h of hijosInvertidos) {
                    const sub = build(h);
                    if (sub) childDiv.appendChild(sub);
                }
                card.appendChild(childDiv);
                icono = document.createElement('span');
                icono.className = 'icon';
                icono.textContent = '▶';
                tituloDiv.appendChild(icono);
            }
            card.appendChild(tituloDiv);
            if (hijos.length) {
                const toggle = () => {
                    if (childDiv.classList.contains('collapsed')) {
                        childDiv.classList.remove('collapsed');
                        icono.textContent = '▼';
                    } else {
                        childDiv.classList.add('collapsed');
                        icono.textContent = '▶';
                    }
                };
                icono.addEventListener('click', (e) => { e.stopPropagation(); toggle(); });
                tituloDiv.addEventListener('click', (e) => {
                    if (e.target.classList && e.target.classList.contains('note-btn')) return;
                    toggle();
                });
            }
            if (nodo.nivel >= 1 && nodo.nivel <= 4) {
                setTimeout(() => updateNoteIndicator(card, nodo.id, currentSlide), 0);
            }
            return card;
        };
        const rootDiv = document.createElement('div');
        for (let r of raices) {
            const rc = build(r.id);
            if (rc) rootDiv.appendChild(rc);
        }
        contenedor.innerHTML = '';
        contenedor.appendChild(rootDiv);
    }

    }
    
    const mapaContainer = document.getElementById('mapaContainer');
    const mapaHeader = document.getElementById('mapaHeader');
    const resizeHandleMap = document.getElementById('resizeHandle');
    let isResizingMap = false, isMovingMap = false;
    let startMapX, startMapY, startMapLeft, startMapTop, startMapW, startMapH;
    
    mapaHeader.addEventListener('mousedown', (e) => {
        if (e.target === mapaHeader || mapaHeader.contains(e.target)) {
            isMovingMap = true;
            startMapX = e.clientX;
            startMapY = e.clientY;
            startMapLeft = mapaContainer.offsetLeft;
            startMapTop = mapaContainer.offsetTop;
            e.preventDefault();
        }
    });
    window.addEventListener('mousemove', (e) => {
        if (isMovingMap) {
            mapaContainer.style.left = `${startMapLeft + (e.clientX - startMapX)}px`;
            mapaContainer.style.top = `${startMapTop + (e.clientY - startMapY)}px`;
        }
        if (isResizingMap) {
            let newW = Math.max(300, startMapW + (e.clientX - startMapX));
            let newH = Math.max(300, startMapH + (e.clientY - startMapY));
            mapaContainer.style.width = `${newW}px`;
            mapaContainer.style.height = `${newH}px`;
        }
    });
    window.addEventListener('mouseup', () => { isMovingMap = false; isResizingMap = false; });
    resizeHandleMap.addEventListener('mousedown', (e) => {
        isResizingMap = true;
        startMapX = e.clientX;
        startMapY = e.clientY;
        startMapW = mapaContainer.offsetWidth;
        startMapH = mapaContainer.offsetHeight;
        e.preventDefault();
    });
    mapaHeader.addEventListener('touchstart', (e) => {
        if (e.target === mapaHeader || mapaHeader.contains(e.target)) {
            isMovingMap = true;
            const t = e.touches[0];
            startMapX = t.clientX;
            startMapY = t.clientY;
            startMapLeft = mapaContainer.offsetLeft;
            startMapTop = mapaContainer.offsetTop;
            e.preventDefault();
        }
    });
    resizeHandleMap.addEventListener('touchstart', (e) => {
        isResizingMap = true;
        const t = e.touches[0];
        startMapX = t.clientX;
        startMapY = t.clientY;
        startMapW = mapaContainer.offsetWidth;
        startMapH = mapaContainer.offsetHeight;
        e.preventDefault();
    });
    window.addEventListener('touchmove', (e) => {
        if (isMovingMap && e.touches[0]) {
            let dx = e.touches[0].clientX - startMapX;
            let dy = e.touches[0].clientY - startMapY;
            mapaContainer.style.left = `${startMapLeft + dx}px`;
            mapaContainer.style.top = `${startMapTop + dy}px`;
        }
        if (isResizingMap && e.touches[0]) {
            let dw = e.touches[0].clientX - startMapX;
            let dh = e.touches[0].clientY - startMapY;
            mapaContainer.style.width = `${Math.max(300, startMapW + dw)}px`;
            mapaContainer.style.height = `${Math.max(300, startMapH + dh)}px`;
        }
    });
    window.addEventListener('touchend', () => { isMovingMap = false; isResizingMap = false; });
    
    const overlay = document.getElementById('overlay');
    const openMapBtn = document.getElementById('openMapBtn');
    const cerrarMapaBtn = document.getElementById('cerrarMapaBtn');
    function abrirMapa() {
        overlay.style.display = 'block';
        mapaContainer.style.display = 'flex';
        openMapBtn.style.display = 'none';
    }
    function cerrarMapa() {
        overlay.style.display = 'none';
        mapaContainer.style.display = 'none';
        openMapBtn.style.display = 'block';
    }
    openMapBtn.addEventListener('click', abrirMapa);
    cerrarMapaBtn.addEventListener('click', cerrarMapa);
    overlay.addEventListener('click', cerrarMapa);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && mapaContainer.style.display === 'flex') cerrarMapa(); });
    
    document.getElementById('expandirTodoMapa').addEventListener('click', expandirTodoMapa);
    document.getElementById('colapsarTodoMapa').addEventListener('click', colapsarTodoMapa);
    
    // --------------------------------------------------------------
    // 4. EXPORTAR TODAS LAS DIAPOSITIVAS A PPTX Y PDF (CORREGIDO)
    // --------------------------------------------------------------
    const downloadAllPPTBtn = document.getElementById('downloadAllPPTBtn');
    const downloadAllPDFBtn = document.getElementById('downloadAllPDFBtn');
    
    async function capturarDiapositiva(numero) {
        const originalSlide = currentSlide;
        currentSlide = numero;
        updateSlideImage();
        await new Promise(resolve => { if (img.complete) resolve(); else img.onload = resolve; });
        await new Promise(r => setTimeout(r, 150)); // esperar renderizado
        const elemento = document.querySelector('.image-viewer');
        if (!elemento) throw new Error('No se encuentra el visor');
        const canvas = await html2canvas(elemento, {
            scale: 2,
            backgroundColor: '#000000',
            useCORS: true,
            logging: false
        });
        currentSlide = originalSlide;
        updateSlideImage();
        await new Promise(resolve => { if (img.complete) resolve(); else img.onload = resolve; });
        return canvas.toDataURL('image/png');
    }
    
    downloadAllPPTBtn.addEventListener('click', async () => {
        const btn = downloadAllPPTBtn;
        const originalText = btn.textContent;
        btn.textContent = '⏳ Generando PPTX (29 diapositivas)...';
        btn.disabled = true;
        try {
            const PptxGenJS = window.PptxGenJS;
            const pptx = new PptxGenJS();
            // Definir tamaño estándar de diapositiva (16:9)
            pptx.defineLayout({ name: 'CUSTOM', width: 10, height: 5.625 });
            pptx.layout = 'CUSTOM';
            
            for (let i = 1; i <= totalSlides; i++) {
                const imgData = await capturarDiapositiva(i);
                const slide = pptx.addSlide();
                // Ajustar imagen para que ocupe toda la diapositiva sin deformarse demasiado
                slide.addImage({ data: imgData, x: 0, y: 0, w: '100%', h: '100%' });
                btn.textContent = `⏳ ${i}/${totalSlides} PPTX...`;
            }
            await pptx.writeFile({ fileName: `todas_diapositivas.pptx` });
            alert('PPTX generado correctamente con 29 diapositivas.');
        } catch (err) {
            console.error(err);
            alert('Error al generar PPTX: ' + err.message);
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
    
    downloadAllPDFBtn.addEventListener('click', async () => {
        const btn = downloadAllPDFBtn;
        const originalText = btn.textContent;
        btn.textContent = '⏳ Generando PDF (29 páginas)...';
        btn.disabled = true;
        try {
            const { jsPDF } = window.jspdf;
            let pdf = null;
            for (let i = 1; i <= totalSlides; i++) {
                const imgData = await capturarDiapositiva(i);
                const imgTemp = new Image();
                imgTemp.src = imgData;
                await new Promise(r => { imgTemp.onload = r; });
                const orientation = imgTemp.width > imgTemp.height ? 'landscape' : 'portrait';
                const pageWidth = imgTemp.width;
                const pageHeight = imgTemp.height;
                if (i === 1) {
                    pdf = new jsPDF({ orientation, unit: 'px', format: [pageWidth, pageHeight] });
                    pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
                } else {
                    pdf.addPage([pageWidth, pageHeight], orientation);
                    pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
                }
                btn.textContent = `⏳ ${i}/${totalSlides} PDF...`;
            }
            if (pdf) pdf.save(`todas_diapositivas.pdf`);
            alert('PDF generado correctamente con 29 páginas.');
        } catch (err) {
            console.error(err);
            alert('Error al generar PDF: ' + err.message);
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
    
    // Inicialización
    updateSlideImage();
    const parsed = parsear(textoOriginal);
    const nodosMapGlobal = new Map();
    parsed.nodos.forEach(n => nodosMapGlobal.set(n.id, n));
    window.currentRenderData = { raices: parsed.raices, nodosMap: nodosMapGlobal, hijosMap: parsed.hijosMap };
    renderizarMapa(parsed.raices, nodosMapGlobal, parsed.hijosMap);
</script>
</body>
</html>
